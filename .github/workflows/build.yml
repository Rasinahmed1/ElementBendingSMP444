name: Build Plugin

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build with Maven
        run: mvn package

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: target/*.jar
